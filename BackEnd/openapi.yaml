openapi: 3.0.0
info:
  title: Campaign Management API
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /campaigns:
    get:
      summary: Get all campaigns
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of campaigns
    post:
      summary: Create a new campaign
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT